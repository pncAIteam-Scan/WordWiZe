<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WordWiZe v0.6</title>
  <style>
    @font-face {
      font-family: 'Chomage';
      src: url('./Fonts/Chomage.otf') format('opentype'),
           url('./fonts/Chomage.otf') format('opentype'),
           url('Chomage.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'KG Perfect Penmanship';
      src: url('./Fonts/KGPerfectPenmanship.otf') format('opentype'),
           url('./fonts/KGPerfectPenmanship.otf') format('opentype'),
           url('KGPerfectPenmanship.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    :root {
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #64748b;
      --line: #d7deea;
      --brand: #263b82;
      --brand-2: #6c3bd1;
      --good: #0f9f6e;
      --warn: #b45309;
      --bad: #c2410c;
      --found: #d8f7e8;
      --select: #e8e0ff;
      --shadow: 0 18px 45px rgba(31,41,55,.12);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'KG Perfect Penmanship', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(108,59,209,.16), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(15,159,110,.14), transparent 30rem),
        var(--bg);
    }
    button, select { font: inherit; }
    button { cursor: pointer; }
    .app { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 40px; }
    .topline { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:20px; }
    .brand { display:flex; align-items:center; gap:12px; }
    .logo {
      width: 48px; height: 48px; border-radius: 16px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color:#fff; display:grid; place-items:center; font-weight:900; letter-spacing:.5px;
      box-shadow: var(--shadow);
    }
    .brand h1 { margin:0; font-family:'Chomage', 'KG Perfect Penmanship', sans-serif; font-size: clamp(30px, 4vw, 54px); line-height: 1; letter-spacing:.01em; }
    .version { color:var(--muted); font-weight:700; font-size:13px; }
    .nav-actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      background: #eef2ff;
      color: var(--brand);
      font-weight: 800;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(31,41,55,.12); }
    .btn.primary { background: linear-gradient(135deg, var(--brand), var(--brand-2)); color:#fff; }
    .btn.ghost { background: #fff; color: var(--ink); border:1px solid var(--line); }
    .btn.warn { background:#fff7ed; color:var(--bad); border:1px solid #fed7aa; }
    .btn:disabled { opacity: .55; cursor:not-allowed; transform:none; box-shadow:none; }

    .screen { display:none; }
    .screen.active { display:block; }
    .hero {
      background: rgba(255,255,255,.86);
      border: 1px solid rgba(215,222,234,.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .hero-inner { display:grid; grid-template-columns: 1.1fr .9fr; gap:24px; padding: clamp(22px, 4vw, 44px); align-items:center; }
    .eyebrow { text-transform:uppercase; color:var(--brand-2); letter-spacing:.15em; font-weight:900; font-size:13px; margin-bottom:10px; }
    .hero h2 { font-family:'Chomage', 'KG Perfect Penmanship', sans-serif; font-size: clamp(30px, 5vw, 64px); line-height:.96; letter-spacing:.01em; margin:0 0 18px; }
    .hero p { color: var(--muted); font-size: 18px; line-height:1.55; margin:0 0 24px; max-width: 62ch; }
    .config-card { background:#f8fafc; border:1px solid var(--line); border-radius:20px; padding:18px; }
    .field { display:grid; gap:8px; margin-bottom:14px; }
    label { font-weight:900; font-size:13px; color:#334155; text-transform:uppercase; letter-spacing:.08em; }
    select { width:100%; border:1px solid var(--line); border-radius:14px; padding:12px 14px; background:#fff; color:var(--ink); font-weight:700; }
    .level-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-top:8px; }
    .level-card {
      text-align:center; border:1px solid var(--line); background:#fff; border-radius:18px; padding:18px 12px; min-height:74px; display:grid; place-items:center;
    }
    .level-card.active { outline: 3px solid rgba(108,59,209,.25); border-color:var(--brand-2); }
    .level-card strong { display:block; font-family:'Chomage', 'KG Perfect Penmanship', sans-serif; font-size:18px; margin-bottom:0; letter-spacing:.01em; }
    .level-card span { display:block; color:var(--muted); font-size:13px; line-height:1.35; }
    .mini-stats { display:grid; grid-template-columns: repeat(2,1fr); gap:10px; margin-top:14px; }
    .stat-tile { background:#fff; border:1px solid var(--line); border-radius:16px; padding:14px; }
    .stat-tile b { display:block; font-size:24px; letter-spacing:-.04em; }
    .stat-tile small { color:var(--muted); font-weight:800; }

    .game-layout { display:grid; grid-template-columns: minmax(360px, 1fr) 360px; gap:18px; align-items:start; }
    .panel { background:rgba(255,255,255,.92); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); }
    .game-panel { padding:18px; }
    .game-header { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:14px; }
    .game-title h2 { margin:0; font-family:'Chomage', 'KG Perfect Penmanship', sans-serif; font-size:28px; letter-spacing:.01em; }
    .game-title p { margin:5px 0 0; color:var(--muted); font-weight:700; }
    .metric-row { display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-bottom:14px; }
    .metric { background:#f8fafc; border:1px solid var(--line); border-radius:16px; padding:10px 12px; }
    .metric b { display:block; font-size:20px; }
    .metric span { color:var(--muted); font-size:12px; font-weight:900; text-transform:uppercase; letter-spacing:.07em; }
    .grid-wrap { overflow:auto; padding:10px; border-radius:20px; background:#f8fafc; border:1px solid var(--line); }
    .word-grid {
      display:grid;
      gap:4px;
      margin:auto;
      width:max-content;
      touch-action: manipulation;
      user-select:none;
    }
    .cell {
      width: var(--cell-size, 42px);
      height: var(--cell-size, 42px);
      border:1px solid #cbd5e1;
      border-radius: 10px;
      background:#fff;
      font-weight:900;
      color:#1e293b;
      display:grid;
      place-items:center;
      box-shadow: 0 2px 0 rgba(15,23,42,.05);
    }
    .cell.selected { background: var(--select) !important; border-color: var(--brand-2) !important; color: var(--brand-2) !important; }
    .cell.preview { background:#eef2ff !important; }
    .cell.found { background: var(--word-bg, var(--found)); border-color: var(--word-border, #86efac); color: var(--word-ink, #0f172a); }
    .cell.revealed { background:#ffedd5; border-color:#fdba74; color:#9a3412; }
    .side-panel { padding:18px; position:sticky; top:18px; }
    .side-panel h3 { margin:0 0 10px; letter-spacing:-.03em; }
    .word-bank { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
    .word-chip { border:1px solid var(--line); background:#fff; border-radius:999px; padding:7px 10px; font-weight:800; font-size:13px; color:#334155; }
    .word-chip.found { background:var(--word-bg, var(--found)); border-color:var(--word-border, #86efac); color:var(--word-ink, #0f172a); text-decoration: line-through; }
    .cell.word-focus { outline: 3px solid var(--focus-border, #111827); outline-offset: 2px; position: relative; z-index: 2; transform: scale(1.04); }
    .word-chip.found { cursor: pointer; }
    .badge-share { margin-top:10px; border:0; border-radius:999px; padding:7px 10px; background:#eef2ff; color:var(--brand); font-weight:900; font-size:12px; }
    .badge-share:hover { box-shadow:0 6px 14px rgba(31,41,55,.12); }
    .word-chip.locked-clue { border-radius:16px; width:100%; padding:11px 12px; background:#f8fafc; color:#334155; text-decoration:none; }
    .word-chip.locked-clue b { display:block; margin-bottom:4px; color:var(--brand-2); }
    .word-chip.locked-clue span { display:block; color:#64748b; line-height:1.35; font-weight:700; }
    .definition-list { display:grid; gap:10px; max-height:330px; overflow:auto; padding-right:4px; }
    .definition-card { border:1px solid var(--line); border-radius:16px; padding:12px; background:#fff; }
    .definition-card.locked { background:#f8fafc; color:#94a3b8; }
    .definition-card strong { display:block; margin-bottom:4px; }
    .definition-card p { margin:0; color:#475569; line-height:1.4; font-size:14px; }
    .definition-card small { color:var(--brand-2); font-weight:900; text-transform:uppercase; letter-spacing:.08em; }
    .action-row { display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; }
    .hint-box { display:none; border:1px solid #fde68a; background:#fffbeb; color:#78350f; border-radius:16px; padding:12px; line-height:1.45; font-weight:700; margin-top:12px; }
    .hint-box.active { display:block; }

    .result-card { display:none; margin-top:14px; border-radius:20px; border:1px solid var(--line); background:#fff; padding:18px; }
    .result-card.active { display:block; }
    .result-card h3 { margin:0 0 6px; font-family:'Chomage', 'KG Perfect Penmanship', sans-serif; font-size:28px; letter-spacing:.01em; }
    .result-card p { margin:0 0 12px; color:var(--muted); line-height:1.45; }
    .rank { display:inline-flex; align-items:center; gap:8px; border-radius:999px; padding:8px 12px; background:#eef2ff; color:var(--brand); font-weight:900; }

    .modal-backdrop { display:none; position:fixed; inset:0; background:rgba(15,23,42,.45); z-index:50; align-items:center; justify-content:center; padding:20px; }
    .modal-backdrop.active { display:flex; }
    .modal { width:min(760px, 100%); max-height:90vh; overflow:auto; background:#fff; border-radius:26px; box-shadow:var(--shadow); border:1px solid var(--line); padding:22px; }
    .modal-head { display:flex; justify-content:space-between; gap:14px; align-items:start; margin-bottom:12px; }
    .modal h2 { margin:0; font-family:'Chomage', 'KG Perfect Penmanship', sans-serif; font-size:30px; letter-spacing:.01em; }
    .modal p { color:var(--muted); line-height:1.55; }
    .badge-grid { display:grid; grid-template-columns: repeat(3,1fr); gap:12px; }
    .badge { border:1px solid var(--line); background:#fff; border-radius:18px; padding:14px; min-height:130px; }
    .badge.locked { background:#f8fafc; color:#94a3b8; }
    .badge .emoji { font-size:28px; display:block; margin-bottom:8px; }
    .badge strong { display:block; margin-bottom:5px; }
    .badge span { color:var(--muted); font-size:13px; line-height:1.35; }
    .toast-stack { position:fixed; right:18px; bottom:18px; z-index:80; display:grid; gap:10px; }
    .toast { background:#111827; color:#fff; border-radius:18px; padding:14px 16px; box-shadow:var(--shadow); max-width:340px; animation: pop .2s ease; }
    .toast b { display:block; margin-bottom:4px; }
    @keyframes pop { from { transform:translateY(8px); opacity:0; } to { transform:none; opacity:1; } }

    .tiny-note { color:var(--muted); font-size:13px; line-height:1.45; margin-top:12px; }

    @media (max-width: 980px) {
      .hero-inner, .game-layout { grid-template-columns: 1fr; }
      .side-panel { position:static; }
    }
    @media (max-width: 640px) {
      .app { width: min(100% - 20px, 1180px); padding-top:16px; }
      .topline, .game-header { flex-direction:column; align-items:stretch; }
      .level-grid, .metric-row, .badge-grid { grid-template-columns:1fr; }
      .cell { width: var(--cell-size-mobile, 31px); height: var(--cell-size-mobile, 31px); border-radius:8px; font-size:13px; }
      .mini-stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topline">
      <div class="brand">
        <div class="logo">WZ</div>
        <div>
          <h1>WordWiZe</h1>
          <div class="version">v0.6 prelim build</div>
        </div>
      </div>
      <div class="nav-actions">
        <button class="btn ghost" id="statsBtn">Your Stats</button>
        <button class="btn ghost" id="badgesBtn">Badge Case</button>
        <button class="btn ghost" id="whatsNewBtn">What’s New</button>
      </div>
    </header>

    <main id="titleScreen" class="screen active">
      <section class="hero">
        <div class="hero-inner">
          <div>
            <h2>Ready, Set, Search.</h2>
            <p>Hunt hidden words, unlock quick definitions, and see if your puzzle skills are leaderboard-worthy.</p>
            <button class="btn primary" id="startBtn">Start Puzzle</button>
          </div>
          <div class="config-card">
            <div class="field">
              <label for="categorySelect">Category half</label>
              <select id="categorySelect">
                <option value="__MIX__">Random Category Mix</option>
              </select>
            </div>
            <label>Difficulty</label>
            <div class="level-grid" id="levelGrid"></div>
            <div class="mini-stats">
              <div class="stat-tile"><b id="miniCompleted">0</b><small>Puzzles completed</small></div>
              <div class="stat-tile"><b id="miniBest">0</b><small>Best score</small></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <main id="gameScreen" class="screen">
      <div class="game-layout">
        <section class="panel game-panel">
          <div class="game-header">
            <div class="game-title">
              <h2 id="gameLevelTitle">Warm-Up</h2>
              <p id="gameMeta">8 terms · 10x10 · 50% AI / 50% Category</p>
            </div>
            <div class="action-row" style="margin-top:0">
              <button class="btn ghost" id="returnBtn">Return to Title</button>
            </div>
          </div>
          <div class="metric-row">
            <div class="metric"><b id="timer">0:00</b><span>Time</span></div>
            <div class="metric"><b id="foundCount">0/0</b><span>Found</span></div>
            <div class="metric"><b id="scorePreview">0</b><span>Live score</span></div>
          </div>
          <div class="grid-wrap"><div class="word-grid" id="wordGrid"></div></div>
          <div class="action-row">
            <button class="btn ghost" id="newPuzzleBtn">New Puzzle</button>
          </div>
          <div class="result-card" id="resultCard"></div>
        </section>
        <aside class="panel side-panel">
          <h3>Word Bank</h3>
          <div class="word-bank" id="wordBank"></div>
        </aside>
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h2 id="modalTitle">Modal</h2>
        <button class="btn ghost" id="closeModalBtn">Close</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>
  <div class="toast-stack" id="toastStack"></div>

  if (categoryMode !== '__MIX__') categoryPool = categoryPool.filter(w => w.category === categoryMode);

  const pickedAI = shuffle(aiPool).slice(0, level.aiTerms);

  const chosenNorms = new Set(pickedAI.map(w=>w.norm));
  for (const word of shuffle(categoryPool)) {

  if (pickedAI.length < level.aiTerms || pickedCat.length < level.categoryTerms) throw new Error('Not enough words fit this grid.');

    if (canPlace(grid, wordObj.grid, r, c, dr, dc)) {
      const cells=[];
      for (let i=0;i<wordObj.grid.length;i++) {

        grid[rr][cc] = wordObj.grid[i];

    if (!meetsDirectionRequirements(words, level.requiredDirections)) continue;

function getWordColor(word) {

}
function copyText(text) {
  if (navigator.clipboard && window.isSecureContext) navigator.clipboard.writeText(text).then(()=>toast('Copied', 'Your WordWiZe share text is ready.')).catch(()=>fallbackCopy(text));
  else fallbackCopy(text);
}
function fallbackCopy(text) {
  const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); toast('Copied', 'Your WordWiZe share text is ready.'); } catch { toast('Copy failed', 'You can manually copy the text from the result card.'); }
  ta.remove();
}
function toast(title, msg) {
  const stack=document.getElementById('toastStack');
  const el=document.createElement('div'); el.className='toast'; el.innerHTML=`<b>${escapeHtml(title)}</b><span>${escapeHtml(msg)}</span>`;
  stack.appendChild(el); setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(8px)'; }, 4200); setTimeout(()=>el.remove(), 4700);
}
function showModal(title, bodyHtml) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalBackdrop').classList.add('active');
}
function closeModal() { document.getElementById('modalBackdrop').classList.remove('active'); }
function showStats() {
  showModal('Your Stats', `<div class="mini-stats" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat-tile"><b>${stats.completed}</b><small>Puzzles Completed</small></div>
    <div class="stat-tile"><b>${stats.givenUp}</b><small>Puzzles Given Up</small></div>
    <div class="stat-tile"><b>${stats.totalBoardsPlayed}</b><small>Total Boards Played</small></div>
    <div class="stat-tile"><b>${stats.bestScore}</b><small>Best Score</small></div>
    <div class="stat-tile"><b>${stats.bestRank || '—'}</b><small>Best Rank</small></div>
    <div class="stat-tile"><b>${stats.fastestSec ? formatTime(stats.fastestSec) : '—'}</b><small>Fastest Solve</small></div>
    <div class="stat-tile"><b>${stats.totalWordsFound}</b><small>Total Words Found</small></div>
    <div class="stat-tile"><b>${stats.lockedWordsFound || 0}</b><small>Locked Words Found</small></div>
    <div class="stat-tile"><b>${stats.currentStreak}</b><small>Current Streak</small></div>
  </div><div class="action-row"><button class="btn primary" onclick="copyText('WordWiZe stats\nPuzzles completed: ${stats.completed}\nBest score: ${stats.bestScore}\nBest rank: ${stats.bestRank || '—'}\nFastest solve: ${stats.fastestSec ? formatTime(stats.fastestSec) : '—'}')">Copy Top Stats</button></div><p class="tiny-note">Prelim note: streaks currently use calendar days. Workday/federal-holiday streak logic can be layered in later.</p>`);
}
function badgeShareText(badgeName) {
  return `I just played WordWiZe and unlocked the ${badgeName} badge. Think you can beat me? ${GAME_LINK}`;
}
function showBadges() {
  const unlocked = new Set(stats.badgesUnlocked || []);
  const cards = BADGES.map(b => {
    const isUnlocked = unlocked.has(b.id);
    const copyAttr = isUnlocked ? escapeHtml(JSON.stringify(badgeShareText(b.name))) : '';
    return `<div class="badge ${isUnlocked?'':'locked'}"><span class="emoji">${isUnlocked?b.emoji:'🔒'}</span><strong>${isUnlocked?escapeHtml(b.name):'Hidden Badge'}</strong><span>${isUnlocked?escapeHtml(b.desc):'Keep playing to unlock this badge.'}</span>${isUnlocked?`<button class="badge-share" onclick="copyText(${copyAttr})">Copy Badge</button>`:''}</div>`;
  }).join('');
  const progressText = `I’ve unlocked ${unlocked.size} of ${BADGES.length} WordWiZe badges so far. Can you catch up? ${GAME_LINK}`;
  showModal('Badge Case', `<p><strong>${unlocked.size} / ${BADGES.length}</strong> badges unlocked.</p><div class="badge-grid">${cards}</div><div class="action-row"><button class="btn primary" onclick="copyText(${escapeHtml(JSON.stringify(progressText))})">Share Badge Progress</button></div>`);
}
function showWhatsNew() {
  showModal('What’s New in v0.6', `<p>This build tunes the word placement rules by difficulty.</p><ul>
    <li>Warm-Up now guarantees a mix of horizontal and vertical words.</li>
    <li>Brain-Bender uses horizontal, vertical, and diagonal words.</li>
    <li>Expert uses horizontal, vertical, diagonal, and backward words.</li>
    <li>Expert still includes 3 locked AI terms shown only as definition clues until found.</li>
  </ul>`);
}
window.addEventListener('resize', () => { if (state.current) renderGrid(); });
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('returnBtn').addEventListener('click', () => { stopTimer(); showScreen('titleScreen'); });
document.getElementById('newPuzzleBtn').addEventListener('click', startGame);
document.getElementById('statsBtn').addEventListener('click', showStats);
document.getElementById('badgesBtn').addEventListener('click', showBadges);
document.getElementById('whatsNewBtn').addEventListener('click', showWhatsNew);
document.getElementById('closeModalBtn').addEventListener('click', closeModal);
document.getElementById('modalBackdrop').addEventListener('click', e => { if(e.target.id==='modalBackdrop') closeModal(); });

renderCategorySelect(); renderLevelCards(); renderMiniStats();
</script>
</body>
</html>
